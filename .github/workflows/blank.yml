name: Deploy Django to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            PROJECT_DIR=/var/www/safeisol
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            # 1. Обновляем код
            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/main
            else
              git clone https://github.com/kukarek/safeisol-prod.git .
            fi

            # 2. Генерируем .env (после pull, чтобы не перезатереть)
            cat > .env <<'ENVEOF'
            DB_HOST=${{ secrets.DB_HOST }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_PORT=${{ secrets.DB_PORT }}
            CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
            CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}
            SMTP=${{ secrets.SMTP }}
            ADMIN_PASS=${{ secrets.ADMIN_PASS }}
            ENVEOF

            # 3. Загружаем переменные для подстановки в docker-compose
            set -a
            . ./.env
            set +a

            # 4. Сборка с передачей аргументов
            docker-compose build \
              --build-arg SECRET_KEY="$SECRET_KEY" \
              --build-arg ALLOWED_HOSTS="$ALLOWED_HOSTS" \
              web

            # 5. Запуск
            docker-compose up -d --force-recreate

            # 6. Проверка готовности
            max_attempts=20
            attempt=0
            until docker-compose exec -T web python manage.py check > /dev/null 2>&1 || [ $attempt -eq $max_attempts ]; do
              echo "Waiting for web container... ($attempt/$max_attempts)"
              attempt=$((attempt + 1))
              sleep 3
            done

            # 7. Миграции и тесты
            docker-compose exec -T web python manage.py migrate --noinput
            docker-compose exec -T web coverage run --source='.' manage.py test
            docker-compose exec -T web coverage report -m
            
            # Чистка
            docker image prune -af

      - name: Check disk space
        run: |
          MIN_FREE_GB=1
          FREE_GB=$(df --output=avail -BG / | tail -1 | tr -dc '0-9')
          if [ "$FREE_GB" -lt "$MIN_FREE_GB" ]; then
            echo "❌ Недостаточно места: ${FREE_GB}G"
            exit 1
          fi
          echo "✅ Свободного места достаточно: ${FREE_GB}G"
