name: Deploy Django to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            PROJECT_DIR=/var/www/safeisol
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            # 1. Обновляем код
            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/main
            else
              git clone https://github.com/kukarek/safeisol-prod.git .
            fi

            # 2. Генерируем .env (ВАЖНО: без отступов слева)
            cat <<EOF > .env
            DB_HOST=${{ secrets.DB_HOST }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_PORT=${{ secrets.DB_PORT }}
            CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
            CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}
            SMTP=${{ secrets.SMTP }}
            ADMIN_PASS=${{ secrets.ADMIN_PASS }}
            EOF

            # 3. Сборка и запуск (Docker Compose сам подхватит .env для контейнеров)
            docker-compose up -d --build --force-recreate

            # 4. Проверка готовности (ждем, пока Django ответит)
            attempt=0
            until docker-compose exec -T web python manage.py check > /dev/null 2>&1 || [ $attempt -eq 15 ]; do
              echo "Waiting for web container... ($attempt/15)"
              attempt=$((attempt + 1))
              sleep 3
            done

            # 5. Миграции и тесты
            docker-compose exec -T web python manage.py migrate --noinput
            docker-compose exec -T web coverage run manage.py test
            docker-compose exec -T web coverage report -m
            
            # 6. Очистка старых образов
            docker image prune -f

      - name: Check disk space (на GitHub Runner)
        run: |
          FREE_GB=$(df --output=avail -BG / | tail -1 | tr -dc '0-9')
          echo "✅ Свободно на раннере: ${FREE_GB}G"