name: Deploy Django to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            PROJECT_DIR=/var/www/safeisol
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/main
            else
              git clone https://github.com/kukarek/safeisol-prod.git .
            fi

            # 1. Генерируем .env
            printf "DB_HOST=%s\n" "${{ secrets.DB_HOST }}" > .env
            printf "DB_NAME=%s\n" "${{ secrets.DB_NAME }}" >> .env
            printf "DB_USER=%s\n" "${{ secrets.DB_USER }}" >> .env
            printf "DB_PASSWORD=%s\n" "${{ secrets.DB_PASSWORD }}" >> .env
            printf "DB_PORT=%s\n" "${{ secrets.DB_PORT }}" >> .env
            printf "CELERY_BROKER_URL=%s\n" "${{ secrets.CELERY_BROKER_URL }}" >> .env
            printf "CELERY_RESULT_BACKEND=%s\n" "${{ secrets.CELERY_RESULT_BACKEND }}" >> .env
            printf "ALLOWED_HOSTS=%s\n" "${{ secrets.ALLOWED_HOSTS }}" >> .env
            printf "SECRET_KEY=%s\n" "${{ secrets.SECRET_KEY }}" >> .env
            printf "EMAIL_HOST_USER=%s\n" "${{ secrets.EMAIL_HOST_USER }}" >> .env
            printf "EMAIL_HOST_PASSWORD=%s\n" "${{ secrets.EMAIL_HOST_PASSWORD }}" >> .env
            printf "DEFAULT_FROM_EMAIL=%s\n" "${{ secrets.DEFAULT_FROM_EMAIL }}" >> .env
            printf "SMTP=%s\n" "${{ secrets.SMTP }}" >> .env
            printf "ADMIN_PASS=%s\n" "${{ secrets.ADMIN_PASS }}" >> .env

            # 2. Очистка порта 80 и старых контейнеров
            echo "--- Жёсткая очистка порта 80 ---"
            
            # Останавливаем системный nginx
            sudo systemctl stop nginx || true
            
            # Убиваем любой процесс, который слушает порт 80 (force kill)
            sudo fuser -k 80/tcp || true
            sudo fuser -k 443/tcp || true
            
            # Даем системе секунду освободить сокет
            sleep 2
            
            echo "Остановка старых контейнеров проекта..."
            docker-compose down --remove-orphans || true
            
            # На всякий случай проверяем, не остался ли кто-то
            if sudo lsof -i :80; then
              echo "❌ Порт 80 все еще занят! Пытаемся убить процесс вручную..."
              sudo lsof -t -i:80 | xargs sudo kill -9 || true
            fi

            # 3. Сборка и запуск
            docker-compose up -d --build --force-recreate
            
            # 4. Чистка
            docker image prune -f

      - name: Check disk space (на GitHub Runner)
        run: |
          FREE_GB=$(df --output=avail -BG / | tail -1 | tr -dc '0-9')
          echo "✅ Свободно на раннере: ${FREE_GB}G"