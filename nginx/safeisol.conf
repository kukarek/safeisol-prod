# HTTP -> редирект на HTTPS + Certbot check
server {
    listen 80;
    server_name safeisol.ru www.safeisol.ru;

    # Специальный путь для проверки Certbot
    # Nginx будет искать проверочные файлы в /var/www/certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Все остальные запросы на 80 порту — редирект на HTTPS
    location / {
        return 301 https://safeisol.ru$request_uri;
    }
}

# WWW -> редирект на основной домен
server {
    listen 443 ssl;
    server_name www.safeisol.ru;

    ssl_certificate /etc/letsencrypt/live/safeisol.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safeisol.ru/privkey.pem;

    return 301 https://safeisol.ru$request_uri;
}

# HTTPS — основной сайт
server {
    listen 443 ssl;
    server_name safeisol.ru;

    ssl_certificate /etc/letsencrypt/live/safeisol.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safeisol.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;

    # Обслуживание статики
    location /static/ {
        alias /staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Проксирование к приложению
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Логи
    access_log /var/log/nginx/safeisol_access.log;
    error_log /var/log/nginx/safeisol_error.log;
}